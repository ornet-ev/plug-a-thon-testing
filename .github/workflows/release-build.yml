name: Release Build

on:
  push:
    tags:
      - '*'

env:
  CI: true

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
      - name: Extract branch name
        shell: bash
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT
        id: extract_branch


      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Compile Kotlin MDIBs to XML MDIBs
        run: |
          pushd build/mdib
          ./gradlew run
          popd

      - name: Generate markdown
        run: |
          pushd build/markdown
          ./gradlew run
          popd

      - name: Build offline site
        uses: astral-sh/setup-uv@v7
      - run: uvx --from=toml-cli toml set --toml-path=zensical.toml project.plugins.offline.enabled true  # enable offline mode for artifacts to work correctly
      - run: uvx zensical build --clean

      - name: Create artifacts folder and copy files
        run: ./.github/copy_artifacts.sh

      - name: Copy site
        run: ./.github/copy_site.sh

      - name: Upload artifacts
        # if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: plug-a-thon-mdibs-${{ github.ref_name }}
          path: plug-a-thon-mdibs

      - name: Create release page
        uses: ncipollo/release-action@v1
        with:
          name: "Release ${{ github.ref_name }}"
          makeLatest: true
          body: "📋 [Documentation and Changelog](https://github.com/ornet-ev/plug-a-thon-mdibs/blob/${{ github.ref_name }}/README.md)"
          artifacts: "plug-a-thon-mdibs/*"